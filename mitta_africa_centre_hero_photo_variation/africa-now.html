  </footer>
  <script>
      (function () {
        const nav = document.getElementById('top-nav');
        const logo = document.getElementById('nav-logo');
        const navMenuItem = document.getElementsByClassName('nav-menu-item');
        if (!nav) return;

        const scrolledClasses = ['bg-[#fef9ef]/80', 'dark:bg-stone-950/80', 'backdrop-blur-md'];
        const threshold = 24;

        function updateNavBackdrop() {
          const shouldShowBackdrop = window.scrollY > threshold;
          nav.classList.toggle('bg-transparent', !shouldShowBackdrop);
          scrolledClasses.forEach((className) => nav.classList.toggle(className, shouldShowBackdrop));
          if (navMenuItem.length > 0) {
            Array.from(navMenuItem).forEach((item) => item.classList.toggle('text-surface', !shouldShowBackdrop));
            Array.from(navMenuItem).forEach((item) => item.classList.toggle('text-stone-600', shouldShowBackdrop));
          }
          if (logo) {
            logo.classList.toggle('text-surface', !shouldShowBackdrop);
            logo.classList.toggle('text-[#8B0000]', shouldShowBackdrop);
          }
        }

        updateNavBackdrop();
        window.addEventListener('scroll', updateNavBackdrop, { passive: true });
      })();
  </script>
</body>

</html>
